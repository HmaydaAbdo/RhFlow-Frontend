<!-- ── Loading Spinner ── -->
<div *ngIf="loading" class="flex justify-content-center align-items-center py-8">
  <i class="fa fa-circle-notch fa-spin text-primary" style="font-size: 2rem"></i>
</div>

<!-- ── Content ── -->
<ng-container *ngIf="!loading && stats">

  <!-- Section title + link -->
  <div class="widget-header">
    <div class="widget-section-title">
      <i class="fa fa-bullhorn"></i>
      <span>Besoins en recrutement</span>
    </div>
    <a routerLink="/besoins-recrutement/validation" class="widget-link">
      Voir tout <i class="fa fa-arrow-right ml-1 text-xs"></i>
    </a>
  </div>

  <!-- Counters row -->
  <div class="stats-counters">

    <div class="stat-counter-item">
      <div class="stat-icon" style="background: rgba(99,102,241,0.12); color: #6366f1">
        <i class="fa fa-layer-group"></i>
      </div>
      <div class="stat-value">{{ stats.total }}</div>
      <div class="stat-label">Total</div>
    </div>

    <div class="stat-counter-item">
      <div class="stat-icon" style="background: rgba(59,130,246,0.12); color: #3b82f6">
        <i class="fa fa-clock"></i>
      </div>
      <div class="stat-value text-blue-500">{{ stats.enCours }}</div>
      <div class="stat-label">En cours</div>
    </div>

    <div class="stat-counter-item">
      <div class="stat-icon" style="background: rgba(34,197,94,0.12); color: #22c55e">
        <i class="fa fa-circle-check"></i>
      </div>
      <div class="stat-value text-green-500">{{ stats.acceptes }}</div>
      <div class="stat-label">Acceptés</div>
    </div>

    <div class="stat-counter-item">
      <div class="stat-icon" style="background: rgba(239,68,68,0.12); color: #ef4444">
        <i class="fa fa-circle-xmark"></i>
      </div>
      <div class="stat-value text-red-500">{{ stats.refuses }}</div>
      <div class="stat-label">Refusés</div>
    </div>

  </div>

  <!-- Charts row -->
  <div class="charts-row" *ngIf="stats.total > 0">

    <!-- Bar chart: par direction -->
    <div class="chart-box" *ngIf="stats.parDirection.length > 0">
      <div class="chart-title">Par direction</div>
      <div class="chart-container">
        <p-chart type="bar" [data]="barChartData" [options]="barChartOptions" height="160px"></p-chart>
      </div>
    </div>

    <!-- Doughnut: par priorité -->
    <div class="chart-box" *ngIf="stats.parPriorite.length > 0">
      <div class="chart-title">Par priorité</div>
      <div class="chart-container">
        <p-chart type="doughnut" [data]="doughnutChartData" [options]="doughnutChartOptions" height="160px"></p-chart>
      </div>
    </div>

  </div>

  <!-- Empty state -->
  <div class="widget-empty" *ngIf="stats.total === 0">
    <i class="fa fa-bullhorn text-color-secondary" style="font-size:1.75rem; opacity: 0.3"></i>
    <p class="text-sm text-color-secondary mt-2 mb-0">Aucun besoin en recrutement pour l'instant.</p>
  </div>

</ng-container>

<!-- Error state -->
<ng-container *ngIf="!loading && !stats">
  <div class="widget-empty">
    <i class="fa fa-triangle-exclamation text-color-secondary" style="font-size:1.5rem; opacity: 0.3"></i>
    <p class="text-sm text-color-secondary mt-2 mb-0">Impossible de charger les statistiques.</p>
  </div>
</ng-container>
