<p-dialog
  header="Offre LinkedIn générée par IA"
  [visible]="visible"
  (visibleChange)="visibleChange.emit($event)"
  (onHide)="onDialogHide()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="!loading"
  [style]="{ width: '54rem', maxWidth: '95vw' }">

  <!-- ── Loading state ── -->
  <div *ngIf="loading" class="loading-box">
    <i class="fa fa-circle-notch fa-spin text-primary" style="font-size: 1.4rem"></i>
    <span>Génération en cours, veuillez patienter…</span>
  </div>

  <!-- ── Markdown-rendered content ── -->
  <div
    *ngIf="!loading && renderedContent"
    class="offer-markdown"
    [innerHTML]="renderedContent">
  </div>

  <!-- ── Footer ── -->
  <ng-template pTemplate="footer">

    <button
      pButton
      label="Fermer"
      icon="fa fa-times"
      severity="secondary"
      [disabled]="loading"
      (click)="close()">
    </button>

    <button
      *ngIf="renderedContent && !loading"
      pButton
      [label]="copied ? 'Copié !' : 'Copier le texte brut'"
      [icon]="copied ? 'fa fa-check' : 'fa fa-copy'"
      [severity]="copied ? 'success' : 'info'"
      (click)="copy()">
    </button>

  </ng-template>

</p-dialog>
